<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Motion Instrument</title>
    <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>">
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  </head>
  <body>

    <div id="app">

      <header id="header">
        <div id="instrument-selector">
          <button id="instrument-current">
            <span id="instrument-current-icon">〜</span>
            <span id="instrument-current-name">Theremin</span>
            <span id="instrument-arrow">▾</span>
          </button>
          <div id="instrument-dropdown">
            <button class="instrument-option active" data-instrument="theremin">
              <span class="option-icon">〜</span>
              <span class="option-name">Theremin</span>
            </button>
            <button class="instrument-option" data-instrument="pluck">
              <span class="option-icon">♪</span>
              <span class="option-name">Pluck</span>
            </button>
            <button class="instrument-option" data-instrument="drums">
              <span class="option-icon">◉</span>
              <span class="option-name">Drums</span>
            </button>
            <button class="instrument-option" data-instrument="pad">
              <span class="option-icon">▭</span>
              <span class="option-name">Pad</span>
            </button>
          </div>
        </div>

        <div id="header-center">
          <h1 id="app-title">Motion Instrument</h1>
          <p id="app-subtitle">Move your device to play</p>
        </div>

        <button id="theme-toggle" aria-label="Toggle theme">☀</button>
      </header>

      <section id="visualizer-container">
        <canvas id="visualizer"></canvas>
      </section>

      <section id="status-container">
        <div id="zone-indicator">
          <span id="zone-label">--</span>
          <span id="zone-note">--</span>
          <span id="zone-freq">-- Hz</span>
        </div>
        <div id="sensor-bars">
          <div class="sensor-bar-wrap">
            <span class="sensor-bar-label">X</span>
            <div class="sensor-bar-track">
              <div class="sensor-bar-fill" id="bar-x"></div>
            </div>
          </div>
          <div class="sensor-bar-wrap">
            <span class="sensor-bar-label">Y</span>
            <div class="sensor-bar-track">
              <div class="sensor-bar-fill" id="bar-y"></div>
            </div>
          </div>
          <div class="sensor-bar-wrap">
            <span class="sensor-bar-label">Z</span>
            <div class="sensor-bar-track">
              <div class="sensor-bar-fill" id="bar-z"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="effects-container">
        <div class="effect-row">
          <label class="effect-label">Reverb</label>
          <div class="effect-slider-wrap">
            <input type="range" class="effect-slider" id="fx-reverb" min="0" max="100" value="40" />
            <span class="effect-value" id="fx-reverb-val">40%</span>
          </div>
        </div>
        <div class="effect-row">
          <label class="effect-label">Sustain</label>
          <div class="effect-slider-wrap">
            <input type="range" class="effect-slider" id="fx-sustain" min="0" max="100" value="70" />
            <span class="effect-value" id="fx-sustain-val">70%</span>
          </div>
        </div>
        <div class="effect-row">
          <label class="effect-label">Delay</label>
          <div class="effect-slider-wrap">
            <input type="range" class="effect-slider" id="fx-delay" min="0" max="100" value="20" />
            <span class="effect-value" id="fx-delay-val">20%</span>
          </div>
        </div>
        <div class="effect-row">
          <label class="effect-label">Filter</label>
          <div class="effect-slider-wrap">
            <input type="range" class="effect-slider" id="fx-filter" min="0" max="100" value="60" />
            <span class="effect-value" id="fx-filter-val">60%</span>
          </div>
        </div>
      </section>

      <section id="controls-container">
        <button id="play-btn" data-state="idle">
          <span id="play-btn-icon">▶</span>
          <span id="play-btn-label">Play</span>
        </button>
      </section>

      <div id="permission-overlay">
        <div id="permission-card">
          <button id="permission-close">✕</button>
          <p id="permission-title">Motion Access Required</p>
          <p id="permission-desc">This instrument needs access to your device's motion sensors to play.</p>
          <button id="permission-btn">Enable Motion</button>
        </div>
      </div>

      <div id="splash-screen">
        <div id="splash-rings">
          <div class="splash-ring" id="ring-1"></div>
          <div class="splash-ring" id="ring-2"></div>
          <div class="splash-ring" id="ring-3"></div>
          <div class="splash-ring" id="ring-4"></div>
        </div>
        <div id="splash-content">
          <h1 id="splash-title">Motion Instrument</h1>
          <p id="splash-subtitle">Move your device to play</p>
        </div>
      </div>

    </div>

    <script type="module" src="js/ui.js"></script>

  </body>
</html>
